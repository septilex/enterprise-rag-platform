# Prometheus alerting rules for SLO breaches (MON-06).
# Metrics are emitted by app/observability.py.
groups:
  - name: rag-platform-slo
    rules:
      - alert: HighP95Latency
        expr: |
          histogram_quantile(0.95,
            sum(rate(rag_request_latency_seconds_bucket[5m])) by (le, path)
          ) > 2
        for: 5m
        labels: { severity: warning }
        annotations:
          summary: "p95 latency > 2s on {{ $labels.path }}"

      - alert: HighErrorRate
        expr: |
          sum(rate(rag_requests_total{status=~"5.."}[5m]))
          / sum(rate(rag_requests_total[5m])) > 0.05
        for: 5m
        labels: { severity: critical }
        annotations:
          summary: "5xx error rate > 5%"

      - alert: CacheHitRatioCollapse
        expr: |
          sum(rate(rag_cache_hits_total[15m]))
          / clamp_min(sum(rate(rag_cache_hits_total[15m])) + sum(rate(rag_cache_misses_total[15m])), 1)
          < 0.2
        for: 15m
        labels: { severity: warning }
        annotations:
          summary: "Cache hit ratio collapsed below 20%"

      - alert: IngestionFailureSpike
        expr: increase(rag_requests_total{path="/documents/text",status=~"5.."}[10m]) > 5
        for: 10m
        labels: { severity: warning }
        annotations:
          summary: "Ingestion failures spiking"

      - alert: QueryDriftDetected
        expr: increase(rag_query_drift_alerts_total[30m]) > 0
        for: 1m
        labels: { severity: warning }
        annotations:
          summary: "Query-distribution drift detected (MON-05)"
