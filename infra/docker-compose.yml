services:
  postgres:
    image: postgres:16-alpine
    container_name: rag_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: rag_admin
      POSTGRES_PASSWORD: rag_dev_password
      POSTGRES_DB: rag_platform
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 512M

  redis:
    image: redis:7-alpine
    container_name: rag_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    deploy:
      resources:
        limits:
          memory: 256M

  qdrant:
    image: qdrant/qdrant:latest
    container_name: rag_qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    deploy:
      resources:
        limits:
          memory: 1G

  minio:
    image: minio/minio:latest
    container_name: rag_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: rag_admin
      MINIO_ROOT_PASSWORD: rag_dev_password
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    deploy:
      resources:
        limits:
          memory: 512M

  # App services live under the "app" profile so `docker compose up` still
  # brings up only data services. Full stack: `docker compose --profile app up`.
  rag-backend:
    build: ../backend
    container_name: rag_backend
    profiles: ["app"]
    depends_on: [postgres, redis, qdrant]
    env_file: ../backend/.env
    environment:
      DATABASE_URL: postgresql+psycopg2://rag_admin:rag_dev_password@postgres:5432/rag_platform
      QDRANT_HOST: qdrant
      QDRANT_PORT: "6333"
      REDIS_URL: redis://redis:6379/0
      CACHE_ENABLED: "true"
      HYBRID_ENABLED: "true"
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"

  rag-worker:
    build: ../backend
    container_name: rag_worker
    profiles: ["app"]
    depends_on: [postgres, redis, qdrant]
    env_file: ../backend/.env
    environment:
      DATABASE_URL: postgresql+psycopg2://rag_admin:rag_dev_password@postgres:5432/rag_platform
      QDRANT_HOST: qdrant
      QDRANT_PORT: "6333"
      REDIS_URL: redis://redis:6379/0
      CACHE_ENABLED: "true"
    command: python -m app.worker

  rag-scheduler:
    build: ../backend
    container_name: rag_scheduler
    profiles: ["app"]
    depends_on: [postgres, redis]
    env_file: ../backend/.env
    environment:
      DATABASE_URL: postgresql+psycopg2://rag_admin:rag_dev_password@postgres:5432/rag_platform
      REDIS_URL: redis://redis:6379/0
      CACHE_ENABLED: "true"
    command: python -m app.scheduler

  rag-frontend:
    build: ../frontend
    container_name: rag_frontend
    profiles: ["app"]
    depends_on: [rag-backend]
    ports:
      - "8080:80"

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  minio_data: