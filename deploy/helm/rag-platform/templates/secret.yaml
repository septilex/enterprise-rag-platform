{{- if .Values.createSecret }}
# Optional: create the secret from values (dev only). In staging/prod set
# createSecret=false and provision `existingSecret` via Vault/ESO (INFRA-06).
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.existingSecret }}
  labels: {{- include "rag-platform.labels" . | nindent 4 }}
type: Opaque
stringData:
  OPENAI_API_KEY: {{ .Values.secrets.openaiApiKey | quote }}
  API_KEYS: {{ .Values.secrets.apiKeys | quote }}
  PRINCIPALS_JSON: {{ .Values.secrets.principalsJson | quote }}
{{- end }}
