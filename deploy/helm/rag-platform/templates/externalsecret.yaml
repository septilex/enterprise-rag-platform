{{- if .Values.externalSecret.enabled }}
# Pull secrets from an external KMS/secret store via External Secrets Operator
# (SEC-03/INFRA-06) — no plaintext secrets in git or ConfigMaps. Materializes a
# K8s Secret named `existingSecret` that the workloads consume.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ .Values.existingSecret }}
  labels: {{- include "rag-platform.labels" . | nindent 4 }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: {{ .Values.externalSecret.secretStore }}
  target:
    name: {{ .Values.existingSecret }}
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: {{ .Values.externalSecret.remoteKey }}
{{- end }}
