# Default values. Override per environment with values-dev/staging/prod.yaml (INFRA-01).
replicaCount: 2

image:
  repository: rag-platform
  tag: "0.1.0"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8000

# Resource requests/limits are required on every container (INFRA-08).
resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: "1"
    memory: 1Gi

# Horizontal Pod Autoscaler (INFRA-02).
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

# Zero-downtime rolling updates (INFRA-04).
strategy:
  type: RollingUpdate
  rollingUpdate:
    maxSurge: 1
    maxUnavailable: 0

# Production pod/container hardening (SEC-03: least privilege).
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000
  seccompProfile:
    type: RuntimeDefault
containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop: ["ALL"]

# Non-secret config -> env. Secrets come from an existing Secret (INFRA-06).
env:
  DATABASE_URL: "postgresql+psycopg2://rag_admin:rag_dev_password@postgres:5432/rag_platform"
  QDRANT_HOST: "qdrant"
  QDRANT_PORT: "6333"
  REDIS_URL: "redis://redis:6379/0"
  CACHE_ENABLED: "true"
  HYBRID_ENABLED: "true"
  RERANK_ENABLED: "true"
  RERANK_STRATEGY: "heuristic"
  LOG_FORMAT: "json"
  # Observability export (point at your collector). Empty = no export.
  OTEL_EXPORTER_OTLP_ENDPOINT: ""
  # SSO: set AUTH_MODE=oidc and the OIDC_* values (JWKS/issuer/audience) in prod.
  AUTH_MODE: "open"
  # SEC-03: require TLS to Postgres in production, e.g. append ?sslmode=require
  # to DATABASE_URL and mount the CA. Vector store + object storage use
  # encrypted PVs / SSE via the storage class.

# Name of a pre-created Secret holding OPENAI_API_KEY, API_KEYS, PRINCIPALS_JSON.
existingSecret: rag-platform-secrets

# Dev-only: create the secret from these values (set false in staging/prod).
createSecret: false
secrets:
  openaiApiKey: ""
  apiKeys: ""
  principalsJson: ""

# Alembic migration hook Job (INFRA-07).
migrations:
  enabled: true

# Background ingestion worker(s) (ING-09). Drains the Redis queue.
worker:
  enabled: true
  replicaCount: 1
  resources:
    requests: { cpu: 100m, memory: 256Mi }
    limits: { cpu: 500m, memory: 512Mi }
  # HPA on CPU + ingestion queue depth (INFRA-02). Queue-depth scaling needs
  # prometheus-adapter exposing rag_ingestion_queue_depth as an external metric.
  autoscaling:
    enabled: true
    minReplicas: 1
    maxReplicas: 8
    targetCPUUtilizationPercentage: 75
    targetQueueDepthPerReplica: "20"
  # INFRA-09: optional GPU scheduling for self-hosted embedding/reranking. When
  # disabled (default) the worker runs CPU-only and falls back to the external
  # OpenAI-compatible API — no GPU required.
  gpu:
    enabled: false
    count: 1
    nodeSelector:
      nvidia.com/gpu.present: "true"
    tolerations:
      - key: nvidia.com/gpu
        operator: Exists
        effect: NoSchedule

# Ingestion scheduler (ING-03). Enqueues due connector syncs.
scheduler:
  enabled: true
  resources:
    requests: { cpu: 50m, memory: 128Mi }
    limits: { cpu: 200m, memory: 256Mi }

# Scheduled backup + restore-check (INFRA-03). Disabled by default; enable in
# prod with a valid backup image (postgres+aws-cli), plain DB URL, and S3 bucket.
backup:
  enabled: false
  schedule: "0 */6 * * *"          # every 6h; RPO <= 15m needs a shorter cadence
  image: "ghcr.io/rag-platform/backup:0.1.0"   # image with pg_dump + curl + aws
  databaseUrlPlain: "postgresql://rag_admin:rag_dev_password@postgres:5432/rag_platform"
  qdrantCollection: "rag_chunks"
  s3Bucket: ""                      # e.g. my-backups (empty = local dump only)
  resources:
    requests: { cpu: 100m, memory: 128Mi }
    limits: { cpu: 500m, memory: 256Mi }

# Namespace ResourceQuota, configurable per tenant (INFRA-08). Deploy the chart
# per tenant namespace and tune these caps.
resourceQuota:
  enabled: false
  hard:
    requests.cpu: "4"
    requests.memory: 8Gi
    limits.cpu: "8"
    limits.memory: 16Gi
    pods: "50"

# Optional: create the app Secret from an external store via External Secrets
# Operator (SEC-03/INFRA-06) instead of a static K8s Secret.
externalSecret:
  enabled: false
  secretStore: aws-secretsmanager   # ClusterSecretStore name
  remoteKey: rag-platform/prod

probes:
  liveness:
    path: /health
  readiness:
    path: /ready

# Web chat frontend (UI). Served by nginx, proxies /api -> backend.
frontend:
  enabled: true
  replicaCount: 2
  image:
    repository: rag-platform-frontend
    tag: "0.1.0"
  resources:
    requests: { cpu: 50m, memory: 64Mi }
    limits: { cpu: 250m, memory: 128Mi }

# TLS-terminating ingress (SEC-03). Provide a cert Secret (cert-manager/ESO).
ingress:
  enabled: true
  className: nginx
  host: rag.example.com
  tlsSecret: rag-platform-tls
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-buffering: "off"
    cert-manager.io/cluster-issuer: letsencrypt-prod

# Restrict inter-pod traffic to the backend (defense in depth).
networkPolicy:
  enabled: true
  ingressControllerNamespace: ingress-nginx
