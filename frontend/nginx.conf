# Serves the SPA and proxies /api to the backend service (same-origin in-cluster).
server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # SPA fallback.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # API + SSE proxy. Buffering off so streamed chat tokens flush immediately.
  location /api/ {
    proxy_pass http://rag-backend:8000/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header Connection "";
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 300s;
  }
}
