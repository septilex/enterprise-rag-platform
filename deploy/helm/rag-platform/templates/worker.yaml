{{- if .Values.worker.enabled }}
# Background ingestion worker(s): drain the Redis job queue and execute
# ingestion runs off the API request path (ING-09). Scale via replicaCount.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "rag-platform.fullname" . }}-worker
  labels: {{- include "rag-platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: worker
spec:
  replicas: {{ .Values.worker.replicaCount }}
  selector:
    matchLabels:
      {{- include "rag-platform.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: worker
  template:
    metadata:
      labels:
        {{- include "rag-platform.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: worker
    spec:
      securityContext: {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- if .Values.worker.gpu.enabled }}
      # INFRA-09: schedule embedding/reranking workers onto GPU-tainted nodes.
      nodeSelector: {{- toYaml .Values.worker.gpu.nodeSelector | nindent 8 }}
      tolerations: {{- toYaml .Values.worker.gpu.tolerations | nindent 8 }}
      {{- end }}
      containers:
        - name: worker
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext: {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          command: ["python", "-m", "app.worker"]
          envFrom:
            - secretRef:
                name: {{ .Values.existingSecret }}
          env:
            {{- range $k, $v := .Values.env }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
          resources:
            {{- if .Values.worker.gpu.enabled }}
            # GPU present -> request a GPU; absent (gpu.enabled=false) -> CPU only.
            requests: {{- toYaml .Values.worker.resources.requests | nindent 14 }}
            limits:
              {{- range $k, $v := .Values.worker.resources.limits }}
              {{ $k }}: {{ $v }}
              {{- end }}
              nvidia.com/gpu: {{ .Values.worker.gpu.count | quote }}
            {{- else }}
            {{- toYaml .Values.worker.resources | nindent 12 }}
            {{- end }}
{{- end }}
