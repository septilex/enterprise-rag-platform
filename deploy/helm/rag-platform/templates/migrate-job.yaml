{{- if .Values.migrations.enabled }}
# Runs Alembic migrations before rollout (helm hook) so schema is current
# across dev -> staging -> prod promotion (INFRA-07).
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "rag-platform.fullname" . }}-migrate
  labels: {{- include "rag-platform.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-1"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 3
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: migrate
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          command: ["alembic", "upgrade", "head"]
          envFrom:
            - secretRef:
                name: {{ .Values.existingSecret }}
          env:
            {{- range $k, $v := .Values.env }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
          resources: {{- toYaml .Values.resources | nindent 12 }}
{{- end }}
