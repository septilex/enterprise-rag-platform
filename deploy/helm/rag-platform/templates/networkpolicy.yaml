{{- if .Values.networkPolicy.enabled }}
# Default-deny ingress; only allow same-namespace traffic + ingress controller
# to the backend, tightening the inter-service surface (defense in depth, SEC-03/04).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "rag-platform.fullname" . }}-backend
  labels: {{- include "rag-platform.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels: {{- include "rag-platform.selectorLabels" . | nindent 6 }}
  policyTypes: [Ingress]
  ingress:
    - from:
        - podSelector: {}
        {{- with .Values.networkPolicy.ingressControllerNamespace }}
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ . }}
        {{- end }}
      ports:
        - protocol: TCP
          port: {{ .Values.service.port }}
{{- end }}
